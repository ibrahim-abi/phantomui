name: Publish SDK

on:
  push:
    tags:
      - 'sdk/v*.*.*'

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build --workspace=sdk

      - name: Extract semver from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          SEMVER="${TAG#sdk/v}"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

      - name: Bump sdk/package.json version
        run: |
          cd sdk
          npm version "${{ steps.version.outputs.semver }}" --no-git-tag-version || true

      - name: Publish to npm
        run: cd sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SDK v${{ steps.version.outputs.semver }}
          generate_release_notes: true
          files: sdk/dist/ai-sdk.js

  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ibrahim-abi'

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build --workspace=sdk

      - name: Set package name for GitHub Packages
        run: |
          cd sdk
          npm pkg set name='@ibrahim-abi/sdk'
          npm pkg set publishConfig.registry='https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        run: cd sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
